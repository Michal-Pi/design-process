# .github/workflows/verify-golden.yml
# CI workflow: Run the 5× byte-identical golden determinism gate.
# Implements: PREV-03 (D-12 verify --golden scope), Pitfall E (heartbeat step).
#
# WHAT IT TESTS: every deterministic emit script in assets/scripts/ with a
# corresponding fixture in evals/fixtures/golden/ — emit, handoff-bundle,
# gate-stage-5a (both states), mermaid-render.
#
# HEARTBEAT: The final step always prints "verify-golden: PASS" (or "FAIL"),
# making silent failures impossible to miss per Pitfall E.

name: verify-golden

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  verify-golden:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (Mermaid CLI dependency)
        run: npx playwright install --with-deps chromium

      - name: Run verify-golden
        run: npm run verify:golden

      # Heartbeat step — always runs, surfaces "ran successfully" even if output is sparse.
      # Pitfall E mitigation: silent failures are impossible when this step posts.
      - name: Heartbeat — verify-golden summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ job.status }}' === 'success';
            const emoji = success ? '✅' : '❌';
            const status = success ? 'PASS' : 'FAIL';
            core.summary
              .addHeading(`verify-golden: ${status}`, 3)
              .addRaw(`${emoji} Determinism gate — 5× byte-identical runs across schemas-emit, handoff-bundle, gate-stage-5a (both states), mermaid-render.\n`)
              .write();
            console.log(`verify-golden: ${status}`);
