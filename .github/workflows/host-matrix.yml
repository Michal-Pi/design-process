# .github/workflows/host-matrix.yml
# CI workflow: Run eval suite across host profile matrix (D-22 scaffolding).
# Tests: vitest + verify-golden + lint-determinism across 3 host profiles.
# Plan 05 ships the actual host profile dirs (evals/hosts/{claude-code,codex-cli,cursor}/).
#
# MATRIX STRATEGY:
#   claude-code: full subagent dispatch (passes fully)
#   codex-cli: sequential-fallback stubs — schema/gate tests only in Phase 1
#   cursor: sequential-fallback stubs — schema/gate tests only in Phase 1
#
# NOTE: codex-cli and cursor profiles use continue-on-error: true in Phase 1
# because the sequential-fallback paths land in Plan 05. The schema and gate
# tests should pass on all hosts; skillgrade + coexistence may fail on hosts
# without Claude Code dispatch.
#
# D-22: scaffolded in v1.5; host profile dirs complete in Plan 05.
#
# HEARTBEAT: Each job prints its host + pass/fail status per Pitfall E.

name: host-matrix

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  host-matrix:
    name: eval-${{ matrix.host }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        host: [claude-code, codex-cli, cursor]
        include:
          - host: claude-code
            blocking: true
            description: "Full Claude Code dispatch — must pass"
          - host: codex-cli
            blocking: false
            description: "Sequential fallback — Phase 1 schema/gate tests only"
          - host: cursor
            blocking: false
            description: "Sequential fallback — Phase 1 schema/gate tests only"

    # TODO (Plan 05): Use host-specific env vars for actual dispatch
    env:
      HOST_PROFILE: ${{ matrix.host }}
      # CLAUDE_CODE_BIN is not set in CI for Phase 1 (no public eval API)
      # Set this env var when the Claude Code eval API ships

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (for verify-golden)
        run: npx playwright install --with-deps chromium

      - name: Run vitest (schema + gate tests)
        run: npm test

      - name: Run verify-golden
        run: npm run verify:golden

      - name: Run lint-determinism
        run: npm run lint:determinism

      - name: Run skillgrade (design skill)
        # D-22: codex-cli and cursor use sequential-fallback
        # With static-analysis fallback, this may return low recall — acceptable in Phase 1
        continue-on-error: true
        run: |
          npm run eval:skillgrade -- --skill design --triggers evals/triggers/design/triggers.yaml
          echo "eval:skillgrade exit: $?"

      - name: Run aggregate coexistence eval
        # Open Q3: Phase 1 reports the number even if not yet passing
        # TODO: enable blocking once threshold calibrated per Open Q3
        continue-on-error: true
        run: |
          npm run eval:coexistence
          echo "eval:coexistence exit: $?"

      # Adversarial CI (Phase 2 — D-50, RED-05, RED-06, worstProvenance)
      # Runs for all hosts: adversarial suites are pure script tests with no LLM calls.
      # RED-05: 100 synthetic-persona block tests (must all return pass_with_warnings)
      # RED-06: 10 injection canary prompts (gate is proof against prompt content)
      # worstProvenance: mixed-persona fixture propagation invariant
      - name: Run adversarial CI (RED-05, RED-06, worstProvenance)
        run: npx vitest run evals/adversarial/
        env:
          # No auth tokens needed: all adversarial tests are pure script tests
          CI: true

      # Heartbeat — Pitfall E mitigation
      - name: Heartbeat — host-matrix summary
        if: always()
        run: |
          echo "host-matrix [${{ matrix.host }}]: ${{ job.status }}"
          echo "Description: ${{ matrix.description }}"
